<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>GTM & Google Ads 转化测试站</title>
    
    <!-- 1. 在这里粘贴您的 GTM 基础代码 (含有 GTM-XXXXXX 的那段) -->

<script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);

</head>
<body>

    <h1>欢迎来到 GTM 测试网站</h1>
    <p>这是一个用于测试 Google Ads 表单提交转化的临时页面。</p>

    <hr>

    <!-- 简易表单 -->
<form id="testForm">
    <label for="username">姓名：</label>
    <input type="text" id="username" name="username" required><br><br>

    <label for="email">邮箱：</label>
    <input type="email" id="email" name="email" required><br><br>

    <button type="submit" id="submitBtn">提交表单</button>
</form>

<!-- 提示框 -->
<div id="messageBox" style="display:none; margin-top:20px; padding:12px; border-radius:6px;"></div>

<script>
    document.getElementById('testForm').addEventListener('submit', submitForm);

    function showMessage(message, type) {
        var messageBox = document.getElementById('messageBox');
        messageBox.style.display = 'block';
        messageBox.innerHTML = message;

        if (type === 'success') {
            messageBox.style.color = '#155724';
            messageBox.style.backgroundColor = '#d4edda';
            messageBox.style.border = '1px solid #c3e6cb';
        } else if (type === 'error') {
            messageBox.style.color = '#721c24';
            messageBox.style.backgroundColor = '#f8d7da';
            messageBox.style.border = '1px solid #f5c6cb';
        } else {
            messageBox.style.color = '#0c5460';
            messageBox.style.backgroundColor = '#d1ecf1';
            messageBox.style.border = '1px solid #bee5eb';
        }
    }

    function hideMessage() {
        var messageBox = document.getElementById('messageBox');
        messageBox.style.display = 'none';
        messageBox.innerHTML = '';
    }

    function submitForm(event) {
        event.preventDefault();

        var form = document.getElementById('testForm');
        var submitBtn = document.getElementById('submitBtn');
        var usernameInput = document.getElementById('username');
        var emailInput = document.getElementById('email');

        var usernameValue = usernameInput ? usernameInput.value.trim() : '';
        var emailValue = emailInput ? emailInput.value.trim() : '';

        hideMessage();
        submitBtn.disabled = true;
        submitBtn.innerText = '提交中...';

        showMessage('正在模拟 AJAX 提交，请稍候...', 'info');

        setTimeout(function() {
            var isSuccess = true;

            if (isSuccess) {
               // window.dataLayer = window.dataLayer || [];
               // window.dataLayer.push({
               //     event: 'form_submission_success',
                //    form_id: form ? form.id : '',
                //    username: usernameValue,
                //    email: emailValue,
                //    username_input_id: usernameInput ? usernameInput.id : '',
                 //   email_input_id: emailInput ? emailInput.id : ''
                //});

                showMessage('提交成功！这是一次模拟 AJAX 提交。', 'success');

                console.log('模拟提交成功，数据层已推送:', {
                    event: 'form_submission_success',
                    form_id: form ? form.id : '',
                    username: usernameValue,
                    email: emailValue
                });

               // form.reset();
            } else {
                showMessage('提交失败，这是一次模拟失败。', 'error');
            }

            submitBtn.disabled = false;
            submitBtn.innerText = '提交表单';
        }, 1200);
    }
</script>

</body>
</html>
